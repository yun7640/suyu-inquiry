<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>임대 문의 관리 · 수유역 2층 상가</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#14151a;--paper:#f5f2ea;--panel:#fff;--line:#e4ded0;--brand:#0e5c4a;--accent:#ff5a3c;--mut:#6b6b60}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'IBM Plex Sans KR',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6}
  .wrap{max-width:900px;margin:0 auto;padding:32px 20px}
  h1{font-size:24px;font-weight:700}
  .sub{color:var(--mut);font-size:14px;margin-top:4px;margin-bottom:24px}
  .gate{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:24px;max-width:420px}
  .gate label{display:block;font-size:13px;font-weight:600;margin-bottom:8px}
  .gate input{width:100%;font-family:inherit;font-size:15px;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:#fbfaf6}
  .gate input:focus{outline:2px solid var(--brand)}
  .gate button{margin-top:14px;width:100%;background:var(--brand);color:#fff;border:0;border-radius:10px;padding:13px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer}
  .gate .err{color:var(--accent);font-size:13px;margin-top:10px;display:none}
  .bar{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .count{background:var(--brand);color:#fff;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13px;border-radius:100px;padding:4px 12px}
  .refresh{margin-left:auto;background:var(--ink);color:#fff;border:0;border-radius:9px;padding:9px 14px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:12px}
  .chead{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:8px}
  .cname{font-weight:700;font-size:16px}
  .cfloor{font-size:12px;font-weight:600;background:#f2f4f0;color:var(--brand);border-radius:100px;padding:2px 10px}
  .cdate{margin-left:auto;font-size:12px;color:var(--mut);font-family:'IBM Plex Mono',monospace}
  .cmeta{font-size:13.5px;color:#54544b;margin-bottom:8px}
  .cmeta a{color:var(--brand);text-decoration:none;font-weight:600}
  .cmsg{font-size:14.5px;white-space:pre-wrap;background:#fbfaf6;border-radius:9px;padding:12px 14px}
  .empty{color:var(--mut);text-align:center;padding:40px}
  .badge{font-size:12px;font-weight:700;border-radius:100px;padding:2px 10px;color:#fff}
  .st-0{background:#6b7280}
  .st-1{background:#2563eb}
  .st-2{background:#f2b705;color:#3a2c00}
  .st-3{background:#0e5c4a}
  .st-4{background:#a3392a}
  .cactions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .reply{display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-size:13px;font-weight:600;background:var(--brand);color:#fff;border-radius:9px;padding:8px 14px}
  .reply.call{background:var(--ink)}
  .reply.disabled{background:#e4ded0;color:#9a9488;cursor:default}
  .memo-wrap{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line)}
  .memo-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .memo-status{font-family:inherit;font-size:13px;font-weight:600;padding:6px 10px;border:1px solid var(--line);border-radius:8px;background:#fbfaf6}
  .memotime{font-size:12px;color:var(--mut)}
  .memo-text{width:100%;font-family:inherit;font-size:13.5px;padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:#fbfaf6;resize:vertical;box-sizing:border-box}
  .memo-text:focus,.memo-status:focus{outline:2px solid var(--brand)}
  .memo-save{margin-top:8px;background:var(--brand);color:#fff;border:0;border-radius:8px;padding:8px 16px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
  .memo-save:disabled{opacity:.6}
  .memo-msg{font-size:12.5px;font-weight:600;margin-left:10px}
  .memo-msg.ok{color:var(--brand)}
  .memo-msg.err{color:var(--accent)}
  .hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <h1>임대 문의 관리</h1>
  <div class="sub">수유역 2층·3층 상가 · 임대인 전용 페이지</div>

  <div id="gate" class="gate">
    <label for="pw">관리자 비밀번호</label>
    <input type="password" id="pw" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
    <button id="loginBtn">확인</button>
    <div class="err" id="gateErr">비밀번호가 올바르지 않습니다.</div>
  </div>

  <div id="panel" class="hidden">
    <div class="bar">
      <span class="count" id="count">0건</span>
      <button class="refresh" id="refreshBtn">새로고침</button>
    </div>
    <div id="list"></div>
  </div>
</div>

<script>
  let cachedPw = '';
  const gate=document.getElementById('gate');
  const panel=document.getElementById('panel');
  const pwInput=document.getElementById('pw');
  const gateErr=document.getElementById('gateErr');

  async function load(pw){
    const r=await fetch('/api/admin/inquiries',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({password:pw})
    });
    if(r.status===401){ return {ok:false}; }
    return r.json();
  }

  function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
  function escAttr(s){return esc(s).replace(/"/g,'&quot;');}

  const STATUSES=['신규','연락완료','협의중','계약','보류'];

  function render(items){
    document.getElementById('count').textContent=items.length+'건';
    const list=document.getElementById('list');
    if(!items.length){ list.innerHTML='<div class="empty">아직 접수된 문의가 없습니다.</div>'; return; }
    list.innerHTML=items.map(it=>{
      const d=new Date(it.created_at);
      const ds=d.toLocaleString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
      const mail=it.email?` · <a href="mailto:${esc(it.email)}">${esc(it.email)}</a>`:'';
      const biz=it.biz?` · 희망업종: ${esc(it.biz)}`:'';
      const status=it.status||'신규';
      const statusClass='st-'+STATUSES.indexOf(status);
      // 이메일 답장: 문의자 이메일이 있으면 회신 메일 작성창 (제목·인사말 자동)
      const subject=encodeURIComponent('[수유역 상가 임대] 문의 회신드립니다');
      const body=encodeURIComponent(`${it.name}님, 안녕하세요.\n수유역 상가 임대 문의 주셔서 감사합니다.\n\n문의하신 내용에 대해 회신드립니다.\n\n---\n(문의 내용) ${it.message}\n---\n\n`);
      const replyBtn=it.email
        ? `<a class="reply" href="mailto:${esc(it.email)}?subject=${subject}&body=${body}">✉️ 이메일 답장</a>`
        : `<span class="reply disabled" title="이메일 미입력">✉️ 이메일 없음</span>`;
      const memoTime=it.memo_updated_at
        ? `<span class="memotime">저장됨 · ${new Date(it.memo_updated_at).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}</span>`
        : '';
      return `<div class="card">
        <div class="chead">
          <span class="cname">${esc(it.name)}</span>
          ${it.floor?`<span class="cfloor">${esc(it.floor)}</span>`:''}
          <span class="badge ${statusClass}">${esc(status)}</span>
          <span class="cdate">${ds}</span>
        </div>
        <div class="cmeta">📞 <a href="tel:${esc(it.phone)}">${esc(it.phone)}</a>${mail}${biz}</div>
        <div class="cmsg">${esc(it.message)}</div>
        <div class="cactions">
          ${replyBtn}
          <a class="reply call" href="tel:${esc(it.phone)}">📞 전화 걸기</a>
        </div>
        <div class="memo-wrap">
          <div class="memo-row">
            <select class="memo-status" data-id="${it.id}">
              ${STATUSES.map(s=>`<option ${s===status?'selected':''}>${s}</option>`).join('')}
            </select>
            ${memoTime}
          </div>
          <textarea class="memo-text" data-id="${it.id}" rows="2" placeholder="처리 메모 (예: 7/21 전화 완료, 임대료 협의 예정)">${esc(it.memo||'')}</textarea>
          <button class="memo-save" data-id="${it.id}">메모·상태 저장</button>
          <span class="memo-msg" data-id="${it.id}"></span>
        </div>
      </div>`;
    }).join('');

    // 메모 저장 핸들러 바인딩
    list.querySelectorAll('.memo-save').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const id=btn.getAttribute('data-id');
        const memo=list.querySelector(`.memo-text[data-id="${id}"]`).value;
        const status=list.querySelector(`.memo-status[data-id="${id}"]`).value;
        const msg=list.querySelector(`.memo-msg[data-id="${id}"]`);
        btn.disabled=true; btn.textContent='저장 중...';
        try{
          const r=await fetch('/api/admin/memo',{
            method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({password:cachedPw,id:Number(id),memo,status})
          });
          const j=await r.json();
          if(j.ok){ msg.textContent='✅ 저장됨'; msg.className='memo-msg ok'; }
          else{ msg.textContent='⚠️ '+(j.error||'실패'); msg.className='memo-msg err'; }
        }catch(e){ msg.textContent='⚠️ 네트워크 오류'; msg.className='memo-msg err'; }
        btn.disabled=false; btn.textContent='메모·상태 저장';
        setTimeout(()=>{msg.textContent='';},3000);
      });
    });
  }

  async function doLogin(){
    const pw=pwInput.value.trim();
    if(!pw) return;
    const res=await load(pw);
    if(res && res.ok){
      cachedPw=pw;
      gate.classList.add('hidden');
      panel.classList.remove('hidden');
      render(res.items);
    }else{
      gateErr.style.display='block';
    }
  }

  document.getElementById('loginBtn').addEventListener('click',doLogin);
  pwInput.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  document.getElementById('refreshBtn').addEventListener('click',async()=>{
    const res=await load(cachedPw); if(res&&res.ok) render(res.items);
  });
</script>
</body>
</html>
